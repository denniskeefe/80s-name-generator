<html lang="en">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #0f0f1a;
    --border: #1a1a2e;
    --cyan: #00f5ff;
    --pink: #ff006e;
    --purple: #7b2fff;
    --yellow: #ffe600;
    --text: #e0e0f0;
    --muted: #8a8aaa;
    --grid: rgba(0, 245, 255, 0.04);
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Perspective grid floor */
  .grid-bg {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 45vh;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .grid-bg svg {
    width: 100%;
    height: 100%;
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { width: 500px; height: 500px; background: var(--purple); top: -150px; left: -150px; }
  .orb-2 { width: 400px; height: 400px; background: var(--pink); top: -100px; right: -100px; }
  .orb-3 { width: 300px; height: 300px; background: var(--cyan); bottom: 100px; left: 50%; transform: translateX(-50%); opacity: 0.1; }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 680px;
    text-align: center;
  }

  /* Header */
  .header { margin-bottom: 2.5rem; }

  .sun {
    width: 90px;
    height: 45px;
    background: linear-gradient(to bottom, var(--yellow) 0%, var(--pink) 100%);
    border-radius: 90px 90px 0 0;
    margin: 0 auto 1.2rem;
    position: relative;
    overflow: hidden;
  }
  .sun::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 100%;
    background: repeating-linear-gradient(
      transparent,
      transparent 4px,
      var(--bg) 4px,
      var(--bg) 7px
    );
  }

  .title {
    font-family: 'VT323', monospace;
    font-size: clamp(2.4rem, 7vw, 4rem);
    line-height: 1;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0, 245, 255, 0.5), 0 0 40px rgba(0, 245, 255, 0.2);
    letter-spacing: 0.04em;
    margin-bottom: 0.3rem;
  }

  .subtitle {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  /* Name display */
  .name-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--cyan);
    border-radius: 4px;
    padding: 2rem 1.5rem 1.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .name-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,245,255,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .name-label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .name-output {
    font-family: 'VT323', monospace;
    font-size: clamp(2.2rem, 8vw, 3.8rem);
    color: var(--yellow);
    text-shadow: 0 0 15px rgba(255, 230, 0, 0.4);
    min-height: 1.2em;
    letter-spacing: 0.05em;
    transition: opacity 0.1s;
    word-break: break-all;
  }

  .name-output.placeholder { color: var(--muted); font-size: 1.4rem; padding-top: 0.5rem; text-shadow: none; }

  .tagline {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.9rem;
    min-height: 1.1em;
    font-style: italic;
    letter-spacing: 0.05em;
  }

  .badges {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 0.9rem;
    flex-wrap: wrap;
    min-height: 24px;
  }

  .badge {
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    border: 1px solid;
  }
  .badge-movie { color: var(--purple); border-color: var(--purple); background: rgba(123,47,255,0.1); }
  .badge-band  { color: var(--cyan);   border-color: var(--cyan);   background: rgba(0,245,255,0.07); }
  .badge-classic { color: var(--pink); border-color: var(--pink); background: rgba(255,0,110,0.08); }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
    background: transparent;
  }

  .btn-primary {
    color: var(--bg);
    background: var(--cyan);
    border-color: var(--cyan);
    box-shadow: 0 0 18px rgba(0,245,255,0.3);
  }
  .btn-primary:hover { background: #00dde8; box-shadow: 0 0 28px rgba(0,245,255,0.5); transform: translateY(-1px); }
  .btn-primary:active { transform: scale(0.97); }

  .btn-secondary {
    color: var(--cyan);
    border-color: var(--border);
  }
  .btn-secondary:hover { border-color: var(--cyan); background: rgba(0,245,255,0.06); }

  .btn-ghost {
    color: var(--muted);
    border-color: transparent;
    font-size: 0.68rem;
  }
  .btn-ghost:hover { color: var(--text); }

  /* History */
  .history-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    display: none;
  }

  .history-header {
    padding: 0.6rem 1rem;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--text);
    transition: background 0.1s;
  }
  .history-item:last-child { border-bottom: none; }
  .history-item:hover { background: rgba(255,255,255,0.02); }

  .history-name { font-family: 'VT323', monospace; font-size: 1.1rem; letter-spacing: 0.05em; color: var(--yellow); }

  .history-copy {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .history-copy:hover { color: var(--cyan); border-color: var(--cyan); }

  /* Footer */
  .footer {
    margin-top: 2.5rem;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Flicker animation */
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.85; }
    97% { opacity: 1; }
    98% { opacity: 0.9; }
    99% { opacity: 1; }
  }
  .title { animation: flicker 8s infinite; }

  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0; }
  }
  .cursor::after {
    content: '_';
    animation: blink 1s step-end infinite;
    color: var(--cyan);
  }
</style>
</head>

  "Every little thing she does is magic — like this uptime.",
  "Sharp dressed server. Every packet in place.",
  "Dream on — your VPS never sleeps.",
  "Don't you forget about me — or this hostname.",
  "I want you to want me — to name my server this.",
  "Cold as ice, hot as this CPU.",
  "Can I kick it? Yes you can — and deploy to this server.",
];

const badgeLabel = { movie:"movie ref", band:"band ref", classic:"80s classic" };
const badgeClass = { movie:"badge badge-movie", band:"badge badge-band", classic:"badge badge-classic" };

let history = [];
let current = "";

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generate() {
  const a = pick(words);
  const n = pick(nouns);
  current = `${a.w}-${n.w}`;
  const types = [...new Set([a.t, n.t])];

  const el = document.getElementById("nameOutput");
  el.classList.remove("placeholder");
  el.classList.add("cursor");
  el.textContent = current;

  document.getElementById("tagline").textContent = pick(taglines);
  document.getElementById("copyBtn").textContent = "[ Copy ]";
  document.getElementById("badges").innerHTML = types.map(t =>
    `<span class="${badgeClass[t]}">${badgeLabel[t]}</span>`
  ).join("");

  if (!history.find(h => h.name === current)) {
    history.unshift({ name: current, types });
    if (history.length > 8) history.pop();
    renderHistory();
  }
}

function copyName() {
  if (!current) return;
  navigator.clipboard.writeText(current).then(() => {
    document.getElementById("copyBtn").textContent = "[ Copied! ]";
    setTimeout(() => { document.getElementById("copyBtn").textContent = "[ Copy ]"; }, 1500);
  });
}

function copyHistoryItem(name, btn) {
  navigator.clipboard.writeText(name).then(() => {
    btn.textContent = "copied!";
    setTimeout(() => { btn.textContent = "copy"; }, 1500);
  });
}

function clearHistory() {
  history = [];
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById("historySection");
  const container = document.getElementById("historyItems");
  if (history.length === 0) { section.style.display = "none"; return; }
  section.style.display = "block";
  container.innerHTML = history.map(h =>
    `<div class="history-item">
      <span class="history-name">${h.name}</span>
      <div style="display:flex;gap:6px;align-items:center;">
        ${h.types.map(t => `<span class="badge ${badgeClass[t].split(' ')[1]}" style="font-size:0.55rem;">${badgeLabel[t]}</span>`).join("")}
        <button class="history-copy" onclick="copyHistoryItem('${h.name}', this)">copy</button>
      </div>
    </div>`
  ).join("");
}
</script>
</body>
</html>
